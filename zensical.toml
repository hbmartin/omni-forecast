[project]
site_name = "omni-forecast"
site_description = "Station-grounded blending of multi-provider weather forecasts: bias correction, anchoring, and blending judged by a backtest leaderboard."
site_url = "https://hbmartin.github.io/omni-forecast/"
repo_url = "https://github.com/hbmartin/omni-forecast"
repo_name = "hbmartin/omni-forecast"

nav = [
  { "Home" = "index.md" },
  { "Getting Started" = "getting-started.md" },
  { "Advanced Usage" = "advanced-usage.md" },
  { "Theory and Concepts" = "theory.md" },
  { "Architecture" = "architecture.md" },
  { "Limitations" = "limitations.md" },
  { "Improvement Plan" = "improvement-plan.md" },
  { "Releasing" = "releasing.md" },
  { "Decisions" = [
    { "SQLite files are the only upstream contract" = "adr/0001-sqlite-files-are-the-only-upstream-contract.md" },
    { "Anchored nowcast, not disaggregation" = "adr/0002-anchored-nowcast-instead-of-temporal-disaggregation.md" },
    { "Empirical truth-semantics calibration" = "adr/0003-empirical-truth-semantics-calibration.md" },
    { "Grounding defaults to bias-only" = "adr/0004-grounding-defaults-to-bias-only.md" },
  ] },
]

[project.theme]
features = [
  "navigation.sections",
  "navigation.top",
  "content.code.copy",
]

[[project.theme.palette]]
media = "(prefers-color-scheme: light)"
scheme = "default"
primary = "blue"
toggle.icon = "material/weather-night"
toggle.name = "Switch to dark mode"

[[project.theme.palette]]
media = "(prefers-color-scheme: dark)"
scheme = "slate"
primary = "blue"
toggle.icon = "material/weather-sunny"
toggle.name = "Switch to light mode"

[project.markdown_extensions.admonition]
[project.markdown_extensions.pymdownx.details]
[project.markdown_extensions.pymdownx.superfences]
[project.markdown_extensions.pymdownx.highlight]
[project.markdown_extensions.tables]
[project.markdown_extensions.toc]
permalink = true

[project.plugins.search]

[project.plugins.mkdocstrings.config.handlers.python]
paths = ["src"]

[project.plugins.mkdocstrings.config.handlers.python.options]
docstring_style = "google"
show_source = false
members_order = "source"
separate_signature = true
show_signature_annotations = true
