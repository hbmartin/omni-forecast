name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.13", "3.14"]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "latest"

      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Verify locked dependencies
        run: |
          uv lock --check
          uv run --no-project python scripts/check_lock_hosts.py

      - name: Cache uv dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/uv
          key: ${{ runner.os }}-uv-${{ hashFiles('uv.lock') }}
          restore-keys: |
            ${{ runner.os }}-uv-

      - name: Install dependencies
        run: |
          uv sync --dev

      - name: Run Ruff check
        run: |
          uv run ruff check src

      - name: Check Ruff formatting
        run: |
          uv run ruff format --check src tests

      - name: Run Semgrep guardrails
        run: |
          uvx --from semgrep==1.170.0 semgrep scan --test --config semgrep/provider-qc.yml semgrep/tests/provider_qc_grouping.py
          uvx --from semgrep==1.170.0 semgrep scan --metrics=off --error --config semgrep/provider-qc.yml src/grounded_weather_forecast/dataset/matrix.py

      - name: Run Pyrefly check
        run: |
          uv run pyrefly check src

      - name: Run ty check
        run: |
          uv run ty check src

      - name: Check dependencies with Deptry
        run: |
          uv run deptry src --github-output

      - name: Check package metadata with Pyroma
        run: |
          uv run pyroma --min 8 .

      - name: Check complexity and duplication with Lizard
        run: |
          uv run lizard -Eduplicate -C 27 src

      - name: Run tests
        run: |
          uv run pytest tests/ --cov=src --cov-report=xml --cov-report=term-missing

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          files: coverage.xml
          disable_search: true
          fail_ci_if_error: true
          root_dir: .
          token: ${{ secrets.CODECOV_TOKEN }}
          verbose: true

  windows-import-smoke:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "latest"

      - name: Set up Python 3.13
        run: uv python install 3.13

      - name: Verify locked dependencies
        run: |
          uv lock --check
          uv run --no-project python scripts/check_lock_hosts.py

      - name: Install runtime dependencies
        run: uv sync --locked --no-dev

      - name: Import serving modules
        run: uv run --no-sync python -c "import grounded_weather_forecast.serve.history; import grounded_weather_forecast.serve.predict"
