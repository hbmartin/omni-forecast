# grounded-weather-forecast configuration. Copy to config.toml (gitignored) and edit paths.

[station]
db_path = "aw2sqlite.db"
timezone = "America/Los_Angeles"
latitude = 34.2768
longitude = -117.1692
elevation_m = 1400.0
# Set true only for a static snapshot file; the live WAL database must use false.
immutable = true

# Station column -> canonical channel. Defaults cover a standard AmbientWeather
# station; override or extend here.
[station.columns]
outTemp = "temp"
outHumi = "humidity"
avgwind = "wind_speed"
gustspeed = "wind_gust"
eventrain = "rain_counter"
AbsPress = "pressure_station"

# Canonical channel -> source unit (degF | pct | mph | inch | inHg | degC | ms | mm | hpa)
[station.units]
temp = "degF"
humidity = "pct"
wind_speed = "mph"
wind_gust = "mph"
rain_counter = "inch"
pressure_station = "inHg"

[forecasts]
db_path = "crestline_forecasts.sqlite"
# As with the station DB, keep false while the collector writes a WAL database.
immutable = false
# Empty = every source discovered in the archive; otherwise an allowlist of slugs.
sources = []
max_forecast_age_hours = 12.0

[dataset]
dir = "data"
min_hour_coverage = 0.8
min_day_coverage = 0.8
pop_threshold_mm = 0.254
# A rain-counter drop below this fraction of the prior value is a genuine reset
# (the new value is the accumulation since it); a smaller dip is sensor noise and
# adds no rain. Prevents a one-count jitter from inventing a full phantom event.
precip_reset_fraction = 0.5

# Plausibility QC on provider (forecast) values, applied before grounding. An
# implausible value is nulled (it then simply drops out of the availability mask).
[provider_qc]
enabled = true
# Robust cross-source outlier flagging: null a value that disagrees with the other
# providers at the same valid time by more than mad_k scaled MADs AND the per-variable
# min_deviation floor, but only once at least min_sources providers are present.
mad_k = 5.0
min_sources = 4
# Absolute physical bounds per canonical variable (defaults cover every variable);
# override here, e.g.:
# [provider_qc.bounds]
# pressure_sea_hpa = [850.0, 1090.0]
# [provider_qc.min_deviation]
# pressure_sea_hpa = 20.0

[qc]
# Metric units. Defaults exist for the standard channels; override here.
[qc.bounds]
temp = [-40.0, 55.0]
[qc.max_step]
temp = 5.0
[qc.flatline_minutes]
temp = 180

[backfill.open_meteo]
models = ["ecmwf_ifs025", "gfs_seamless", "icon_seamless"]
start_date = 2024-01-01

# dynamical.org Zarr backfill (`backfill --provider dynamical`): full forecast
# cycles at native 3-6h steps, i.e. the sub-24h leads the Previous Runs API
# cannot supply. Free and keyless; install with `uv sync --extra backfill`
# from a checkout or `grounded-weather-forecast[backfill]` as a package extra.
# fetched_at = init + publication_lag_hours, so short-lead skill is never
# inflated by pretending a cycle was visible before it was published.
[backfill.dynamical]
models = ["gefs", "aifs_ens"]
start_date = 2025-07-02   # AIFS-ENS archive begins here; GEFS goes back to 2020-10
publication_lag_hours = 6.0
max_lead_hours = 48.0

# Open-Meteo Ensemble API ingestion (`ingest-ensembles`). Ensemble spread is
# stored as ens__* FEATURE columns — honest uncertainty from real members —
# never as blend sources. Open-Meteo keeps only the latest run's members, so
# run the ingest cron at least once per model cycle.
# `build-dataset` must run after each ingest before those features are available
# to backtests and serving.
[ensembles]
models = [
    "ncep_gefs025",                  # GEFS, 31 members (physics)
    "ecmwf_aifs025_ensemble",        # ECMWF AIFS-ENS, 51 members (ML)
    "ncep_aigefs025",                # NOAA AIGEFS, 31 members (ML)
    "google_weathernext2_ensemble",  # Google WeatherNext 2, 64 members (ML)
]
# variables = ["temp_c", "dew_point_c", "wind_speed_ms", "wind_gust_ms", "pressure_sea_hpa", "precip_mm"]

# Promotion gate: "mcs" (Model Confidence Set, the default — a challenger
# ships only when the reference is statistically excluded from the set of
# best methods) or "legacy" (single Diebold-Mariano test). live_gap_factor
# demotes a served method whose realized MAE exceeds its backtest promise.
# Neighbor-station truth cross-checks (`truth-qc --days 30`): Synoptic Data free tier,
# https://synopticdata.com/ — a "$VAR" token reads the environment variable.
# Catches slow sensor drift (>1 degC vs lapse-adjusted neighbor consensus)
# and decorrelation (a failing shield can look plausible for months).
[truth_qc]
synoptic_token = "$SYNOPTIC_TOKEN"
radius_km = 25.0
elevation_band_m = 300.0
lapse_k_per_km = 6.5

[promotion]
rule = "mcs"
alpha = 0.1
live_gap_factor = 1.5
min_live_n = 24

[backtest]
initial_train_days = 90
step_days = 7
rolling_window_days = 180

[predict]
selection = "skill_per_slice"
history_path = "data/predict_history.parquet"
minutely_tau_hours = 3.0
# Optional per-slice pins, e.g.:
# [predict.methods]
# "hourly.temp_c" = "gbm"

[reports]
dir = "reports"

[artifacts]
dir = "artifacts"
